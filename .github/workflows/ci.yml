name: CI

on:
  pull_request:
  push:
    branches: [main]

# Kill older runs for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target/
        uses: Swatinem/rust-cache@v2
        with:
          # Include features/profile in the cache key so separate clippy/test
          # runs don't share build artefacts with different cfg flags.
          shared-key: ci-backend

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Warnings are reported but don't block the build yet. The recovered
        # code in PR #56 carries dozens of dead-code / stylistic lints
        # (unused WIP helpers, `collapsible_if`, `too_many_arguments`, etc.)
        # that we'll clean up in Phase H. Once that's done, tighten this
        # step to `-- -D warnings`.
        run: cargo clippy --all-targets

      - name: cargo test
        run: cargo test --all

  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: svelte-check + vite build
        # `npm run build` is the chained check: svelte-kit sync + svelte-check
        # + vite build (see frontend/package.json). One command covers
        # type-check and static build.
        run: npm run build
