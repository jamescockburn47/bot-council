[server]
host = "0.0.0.0"
port = 3100
cors_origins = []

[database]
url = "sqlite:data/council.db?mode=rwc"

[auth]
admin_token = ""
clerk_issuer = ""
clerk_jwks_url = ""
bot_token_key = ""
# test_mode: integration-test auth backdoor. Must be false in any real
# deployment. Refused at boot when clerk_issuer is also set.
test_mode = false
# Clerk publishable key surfaced to the frontend at runtime via
# GET /api/config.json. Public by design (pk_live_* / pk_test_*).
# Set via APP__AUTH__CLERK_PUBLISHABLE_KEY in /etc/bot-council.env on EVO.
clerk_publishable_key = ""

[http_client]
connect_timeout_secs = 5
# Allow up to 300s for slower bot endpoints to produce a response.
request_timeout_secs = 300
max_retries = 1
retry_delay_secs = 10

[models]
minimax_api_key = ""
minimax_model = "M2.7"
minimax_base_url = "https://api.minimax.chat"
opus_api_key = ""
opus_model = "claude-opus-4-6"
# Inter-round analysis model (kept hot for low-latency round operations).
analysis_base_url = "http://127.0.0.1:8086"
analysis_model = "gemma-4-31B-it-Q4_K_M.gguf"
analysis_connect_timeout_secs = 5
analysis_request_timeout_secs = 120
# Limits post-round analyser fanout to avoid starving local bot endpoints.
analysis_max_concurrency = 2
# Final-pass synthesis: defaults match the primary local server so production
# does not wedge on a missing second listener (e.g. :8087). Override via
# APP__MODELS__FINAL_SYNTHESIS_BASE_URL / APP__MODELS__FINAL_SYNTHESIS_MODEL
# when a dedicated 122B llama.cpp instance is available.
final_synthesis_base_url = "http://127.0.0.1:8086"
final_synthesis_model = "gemma-4-31B-it-Q4_K_M.gguf"
final_synthesis_connect_timeout_secs = 10
final_synthesis_request_timeout_secs = 900
# Warmup gate before final synthesis.
final_synthesis_warmup_enabled = true
# Bounded retries; after exhaustion the debate still completes (synthesis may
# use fallback). Use 0 only when you intentionally want infinite block-until-ready.
final_synthesis_warmup_max_attempts = 24
final_synthesis_warmup_delay_secs = 5
# Local synthesis runs on EVO's Gemma server to avoid cloud dependencies.
# Legacy compatibility fields (kept for safe rollback).
local_synthesis_base_url = "http://127.0.0.1:8086"
local_synthesis_model = "gemma-4-31B-it-Q4_K_M.gguf"

[debate]
# Per-round request budget for bot responses.
default_timeout_secs = 300
max_retries = 2
quorum = 3
synthesis_temperature = 0.0

[sentry]
# Leave dsn empty to disable. Set via APP__SENTRY__DSN.
dsn = ""
environment = "prod"
# Error reporting is always 1.0 when DSN is set. This only controls
# performance tracing sample rate (0.0 = disabled).
traces_sample_rate = 0.0
