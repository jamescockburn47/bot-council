name: CI

on:
  pull_request:
  push:
    branches: [main]

# Kill older runs for the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Hygiene (file lengths)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: File-length gate (300-line rule, grandfathered ratchet)
        # CLAUDE.md: max 300 lines per file, split before adding. New files
        # are gated at 300; pre-existing offenders live in
        # scripts/file-length-grandfather.txt with a ratchet ceiling they
        # may not grow past. Shrink one below 300 → delete its row.
        run: ./scripts/check-file-length.sh

  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target/
        uses: Swatinem/rust-cache@v2
        with:
          # Include features/profile in the cache key so separate clippy/test
          # runs don't share build artefacts with different cfg flags.
          shared-key: ci-backend

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # Warnings are reported but don't block the build yet. The recovered
        # code in PR #56 carries dozens of dead-code / stylistic lints
        # (unused WIP helpers, `collapsible_if`, `too_many_arguments`, etc.)
        # that we'll clean up in Phase H. Once that's done, tighten this
        # step to `-- -D warnings`.
        run: cargo clippy --all-targets

      - name: cargo test
        run: cargo test --all

  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Forbid known-broken imports
        # Two imports have produced the same "Cannot read properties of null
        # (reading 'r')" production crash on this project and must be blocked
        # until/unless the underlying Svelte 5 + adapter-static bundling bugs
        # are fixed upstream:
        #
        #   1. `onDestroy` from 'svelte' — compiles to a helper that reads
        #      Mt.r.on_destroy where Mt is the SSR renderer's current-component
        #      -context (CkH79pZK's `var A = null`), never set in CSR. Any
        #      mount-time registration crashes. Fix: use `$effect(() => () =>
        #      cleanup())` instead. Ref: PR #73.
        #
        #   2. `page` store from '$app/stores' — reactive reads race an early
        #      hydration window where the store value is null, crashing in the
        #      store-as-signal reader. Fix: read `window.location` once and
        #      refresh via `afterNavigate` from '$app/navigation'. Ref: PR #72.
        #
        # If you genuinely need one of these, add the exception with a comment
        # referencing an open upstream issue AND a local mitigation.
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -e
          failed=0
          if grep -rnE "from +['\"]svelte['\"]" frontend/src \
              --include='*.svelte' --include='*.ts' --include='*.js' \
            | grep -E "\bonDestroy\b"; then
            echo "::error::Forbidden import: \`onDestroy\` from 'svelte'. Use \`\$effect(() => () => cleanup())\` instead — see PR #73."
            failed=1
          fi
          if grep -rnE "from +['\"]\\\$app/stores['\"]" frontend/src \
              --include='*.svelte' --include='*.ts' --include='*.js' \
            | grep -E "\\bpage\\b"; then
            echo "::error::Forbidden import: \`page\` from '\$app/stores'. Use \`afterNavigate\` from '\$app/navigation' + a \`window.location.pathname\` snapshot — see PR #72."
            failed=1
          fi
          exit $failed

      - name: svelte-check + vite build
        # `npm run build` is the chained check: svelte-kit sync + svelte-check
        # + vite build (see frontend/package.json). One command covers
        # type-check and static build.
        run: npm run build
